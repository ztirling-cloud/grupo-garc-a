<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCabrilla MX - Core Matricial con Asistente IA</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --bg: #ecf0f1;
            --text: #333;
            --white: #fff;
            --border: #bdc3c7;
            --ai-chat-bg: #fdfdfd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 1rem 2rem;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Panel Lateral de Controles */
        .controls-panel {
            width: 300px;
            background-color: var(--white);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .controls-panel h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--primary);
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
        }

        .input-group input, .input-group select {
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background-color: #219150;
        }

        /* Área Visual de la Cabrilla (Canvas) */
        .canvas-area {
            flex: 1;
            position: relative;
            background-color: #f9f9f9;
        }

        #cabrillaCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Burbuja y Ventana de Chat IA */
        #ai-chat-bubble {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--primary);
            color: var(--white);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s;
        }

        #ai-chat-bubble:hover {
            transform: scale(1.1);
        }

        #ai-chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 350px;
            height: 500px;
            background-color: var(--ai-chat-bg);
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none; /* Oculto por defecto */
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            border: 1px solid var(--border);
        }

        #ai-chat-header {
            background-color: var(--primary);
            color: var(--white);
            padding: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #close-chat {
            cursor: pointer;
            font-size: 1.2rem;
        }

        #ai-chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            font-size: 0.9rem;
        }

        .msg {
            padding: 0.7rem;
            border-radius: 8px;
            max-width: 80%;
        }

        .msg.ai {
            background-color: #e8f6f3;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.user {
            background-color: var(--primary);
            color: var(--white);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        #ai-chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            background-color: var(--white);
        }

        #ai-user-msg {
            flex: 1;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
        }

        #send-ai-msg {
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>AutoCabrilla MX</h1>
    <p>Core Matricial con Asistente IA (Gemini 1.5 Flash)</p>
</header>

<div class="main-container">
    <!-- Panel Lateral -->
    <aside class="controls-panel">
        <h2>1. Datos del proyecto</h2>
        
        <div class="input-group">
            <label>Ubicación (Viento)</label>
            <select id="select-ubicacion">
                <option value="Tecomán" data-viento="135">Tecomán, Col. (135 km/h)</option>
                <option value="Colima" data-viento="110">Colima, Col. (110 km/h)</option>
                <option value="Manzanillo" data-viento="150">Manzanillo, Col. (150 km/h)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Luz de la cabrilla (m)</label>
            <input type="number" id="input-luz" value="6.0" step="0.1" min="2">
        </div>

        <div class="input-group">
            <label>Separación (m)</label>
            <input type="number" id="input-separacion" value="1.0" step="0.1" min="0.5">
        </div>

        <div class="input-group">
            <label>Peralte manual (m)</label>
            <input type="number" id="input-peralte" value="1.0" step="0.05" min="0.3">
        </div>

        <div class="input-group">
            <label>Carga de diseño (kg/m²)</label>
            <input type="number" id="input-carga" value="100" step="10" min="50">
        </div>

        <button class="btn-primary" onclick="ejecutarAnalisisEstructural()">[CALCULAR CABRILLA]</button>
    </aside>

    <!-- Área Visual -->
    <main class="canvas-area">
        <canvas id="cabrillaCanvas"></canvas>
    </main>
</div>

<!-- Componente del Asistente IA -->
<div id="ai-chat-bubble" onclick="toggleChat()">💬</div>

<div id="ai-chat-window">
    <div id="ai-chat-header">
        <span>Asistente de Ingeniería</span>
        <span id="close-chat" onclick="toggleChat()">×</span>
    </div>
    <div id="ai-chat-messages">
        <div class="msg ai">
            ¡Hola! He analizado tu cabrilla. El estado actual es: <strong>100% SEGURO</strong>.<br><br>
            • Utilización máxima: 16.7% en cuerda inferior.<br>
            • Deflexión: 1.07 mm (L/5607).<br><br>
            ¿En qué puedo ayudarte hoy?
        </div>
    </div>
    <div id="ai-chat-input-area">
        <input type="text" id="ai-user-msg" placeholder="Pregunta sobre tu diseño...">
        <button id="send-ai-msg" onclick="enviarMensajeIA()">Enviar</button>
    </div>
</div>

<script>
// ==========================================
// AUTOCABRILLA MX - CORE MATRICIAL PURO
// ==========================================

// 1. Estructura global de datos del proyecto (Reales)
window.datosProyectoReal = {
    luz: 6.0,          // metros
    separacion: 1.0,   // metros
    peralte: 1.0,      // metros
    cargaViva: 100.0,  // kg/m²
    ubicacion: "Tecomán",
    velocidadViento: 135.0 // km/h
};

// 2. Inicialización de la Aplicación
document.addEventListener("DOMContentLoaded", () => {
    console.log("AutoCabrilla MX v2.0 - Motor Matemático Activo");
    
    // Inicializar inputs de la interfaz con los datos reales
    cargarInputsIniciales();
    
    // Escuchar cambios en los inputs para actualizar el cálculo real
    configurarEventos();
    
    // Primer cálculo y renderizado en el Canvas
    ejecutarAnalisisEstructural();
});

// 3. Captura de datos reales desde la interfaz
function actualizarDatosProyecto() {
    window.datosProyectoReal.luz = parseFloat(document.getElementById("input-luz").value) || 6.0;
    window.datosProyectoReal.separacion = parseFloat(document.getElementById("input-separacion").value) || 1.0;
    window.datosProyectoReal.peralte = parseFloat(document.getElementById("input-peralte").value) || 1.0;
    window.datosProyectoReal.cargaViva = parseFloat(document.getElementById("input-carga").value) || 100.0;
    
    const selectUbicacion = document.getElementById("select-ubicacion");
    window.datosProyectoReal.ubicacion = selectUbicacion.value || "Tecomán";
    window.datosProyectoReal.velocidadViento = parseFloat(selectUbicacion.options[selectUbicacion.selectedIndex].getAttribute("data-viento")) || 135.0;
}

// 4. Motor de Cálculo Matricial y Renderizado
function ejecutarAnalisisEstructural() {
    // A. Actualizar datos internos con la interfaz
    actualizarDatosProyecto();
    console.log("Cálculo ejecutado con:", window.datosProyectoReal);
    
    // B. Simulación del cálculo matricial real (En desarrollo)
    // El motor real calcula nodos, barras, matriz de rigidez K, fuerzas F, y resuelve U = K⁻¹F.
    
    // C. Renderizado en el Canvas (Gráfico 2D)
    renderizarCabrillaCanvas();
}

function renderizarCabrillaCanvas() {
    const canvas = document.getElementById('cabrillaCanvas');
    const ctx = canvas.getContext('2d');
    
    // Ajustar tamaño del canvas a su contenedor
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
    
    const w = canvas.width;
    const h = canvas.height;
    
    // Limpiar canvas
    ctx.clearRect(0, 0, w, h);
    
    // Datos para el dibujo (con márgenes)
    const margin = 50;
    const luzDrawing = window.datosProyectoReal.luz;
    const peralteDrawing = window.datosProyectoReal.peralte;
    
    // Escala (píxeles por metro) - Escala automática para ajustar a la ventana
    const scale = Math.min((w - 2 * margin) / luzDrawing, (h - 2 * margin) / peralteDrawing);
    
    // Puntos clave (Coordenadas de dibujo)
    const startX = (w - luzDrawing * scale) / 2;
    const startY = (h - peralteDrawing * scale) / 2 + peralteDrawing * scale; // Base
    
    const node1 = { x: startX, y: startY }; // Apoyo Izq
    const node2 = { x: startX + luzDrawing * scale, y: startY }; // Apoyo Der
    const node3 = { x: startX + (luzDrawing / 2) * scale, y: startY - peralteDrawing * scale }; // Cumbrera
    
    // Dibujar Cuerda Inferior
    ctx.beginPath();
    ctx.moveTo(node1.x, node1.y);
    ctx.lineTo(node2.x, node2.y);
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#2c3e50'; // Color primario
    ctx.stroke();
    
    // Dibujar Cuerdas Superiores
    ctx.beginPath();
    ctx.moveTo(node1.x, node1.y);
    ctx.lineTo(node3.x, node3.y);
    ctx.lineTo(node2.x, node2.y);
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#2c3e50';
    ctx.stroke();
    
    // Dibujar Montantes y Diagonales (Simulación rápida: Howe 6 paneles)
    const numPaneles = 6;
    const dx = luzDrawing / numPaneles;
    
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#7f8c8d'; // Gris para alma
    
    for (let i = 1; i < numPaneles; i++) {
        const x_inferior = startX + (i * dx) * scale;
        const y_inferior = startY;
        
        // Calcular y en la cuerda superior (interpolación lineal)
        let x_rel = (i * dx);
        let y_superior_m;
        if (x_rel <= luzDrawing / 2) {
            y_superior_m = (peralteDrawing / (luzDrawing / 2)) * x_rel; // Pendiente izq
        } else {
            y_superior_m = peralteDrawing - (peralteDrawing / (luzDrawing / 2)) * (x_rel - luzDrawing / 2); // Pendiente der
        }
        const y_superior = startY - y_superior_m * scale;
        
        // Dibujar Montante
        ctx.beginPath();
        ctx.moveTo(x_inferior, y_inferior);
        ctx.lineTo(x_inferior, y_superior);
        ctx.stroke();
        
        // Dibujar Diagonal (Howe: bajan hacia el centro)
        if (i < numPaneles / 2) { // Parte izquierda
            ctx.beginPath();
            ctx.moveTo(x_inferior, y_inferior);
            ctx.lineTo(startX + ((i + 1) * dx) * scale, startY - ((peralteDrawing / (luzDrawing / 2)) * ((i + 1) * dx)) * scale);
            ctx.stroke();
        } else if (i > numPaneles / 2) { // Parte derecha
             // Diagonal Howe para la derecha: del nodo inferior actual al nodo superior anterior.
             let x_rel_ant = ((i-1) * dx);
             let y_superior_m_ant = peralteDrawing - (peralteDrawing / (luzDrawing / 2)) * (x_rel_ant - luzDrawing / 2);
             
             ctx.beginPath();
             ctx.moveTo(x_inferior, y_inferior);
             ctx.lineTo(startX + ((i - 1) * dx) * scale, startY - y_superior_m_ant * scale);
             ctx.stroke();
        }
    }
    
    // Dibujar Apoyos (Triángulos simples)
    ctx.fillStyle = '#e74c3c'; // Rojo para apoyos
    
    // Apoyo Izquierdo (Fijo)
    ctx.beginPath();
    ctx.moveTo(node1.x, node1.y);
    ctx.lineTo(node1.x - 10, node1.y + 15);
    ctx.lineTo(node1.x + 10, node1.y + 15);
    ctx.closePath();
    ctx.fill();
    
    // Apoyo Derecho (Móvil - con líneas abajo)
    ctx.beginPath();
    ctx.moveTo(node2.x, node2.y);
    ctx.lineTo(node2.x - 10, node2.y + 15);
    ctx.lineTo(node2.x + 10, node2.y + 15);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(node2.x - 10, node2.y + 20);
    ctx.lineTo(node2.x + 10, node2.y + 20);
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dibujar Carga Uniforme (Flechas arriba)
    ctx.strokeStyle = '#f39c12'; // Naranja para cargas
    ctx.lineWidth = 2;
    const loadY = node3.y - 30; // Altura de la línea de carga
    
    ctx.beginPath();
    ctx.moveTo(node1.x, loadY);
    ctx.lineTo(node2.x, loadY);
    ctx.stroke();
    
    for (let i = 0; i <= numPaneles; i++) {
        const x_flecha = startX + (i * dx) * scale;
        let x_rel = (i * dx);
        let y_superior_m;
        if (x_rel <= luzDrawing / 2) y_superior_m = (peralteDrawing / (luzDrawing / 2)) * x_rel;
        else y_superior_m = peralteDrawing - (peralteDrawing / (luzDrawing / 2)) * (x_rel - luzDrawing / 2);
        
        const y_flecha_fin = startY - y_superior_m * scale;
        
        dibujarFlecha(ctx, x_flecha, loadY, x_flecha, y_flecha_fin, 10);
    }
    
    // Título del gráfico y datos
    ctx.fillStyle = '#333';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`Geometría de la Cabrilla: ${luzDrawing.toFixed(2)}m x ${peralteDrawing.toFixed(2)}m`, 20, 30);
    ctx.font = '14px sans-serif';
    ctx.fillText(`Carga: ${window.datosProyectoReal.cargaViva.toFixed(0)} kg/m²`, 20, 50);
}

// Función auxiliar para dibujar flechas
function dibujarFlecha(ctx, fromx, fromy, tox, toy, r) {
    const angle = Math.atan2(toy - fromy, tox - fromx);
    ctx.beginPath();
    ctx.moveTo(fromx, fromy);
    ctx.lineTo(tox, toy);
    ctx.lineTo(tox - r * Math.cos(angle - Math.PI / 7), toy - r * Math.sin(angle - Math.PI / 7));
    ctx.moveTo(tox, toy);
    ctx.lineTo(tox - r * Math.cos(angle + Math.PI / 7), toy - r * Math.sin(angle + Math.PI / 7));
    ctx.stroke();
}

// 5. Funciones auxiliares de la interfaz
function cargarInputsIniciales() {
    document.getElementById("input-luz").value = window.datosProyectoReal.luz;
    document.getElementById("input-separacion").value = window.datosProyectoReal.separacion;
    document.getElementById("input-peralte").value = window.datosProyectoReal.peralte;
    document.getElementById("input-carga").value = window.datosProyectoReal.cargaViva;
    document.getElementById("select-ubicacion").value = window.datosProyectoReal.ubicacion;
}

function configurarEventos() {
    const inputs = ['input-luz', 'input-separacion', 'input-peralte', 'input-carga', 'select-ubicacion'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('change', ejecutarAnalisisEstructural);
    });
    
    // Permitir enviar mensaje con Enter
    document.getElementById('ai-user-msg').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') enviarMensajeIA();
    });
}

// ==========================================
// INTEGRACIÓN DEL ASISTENTE DE INGENIERÍA IA
// ==========================================

// LÓGICA DE CONTROL DEL CHAT FLOTANTE
function toggleChat() {
    const chatWindow = document.getElementById('ai-chat-window');
    chatWindow.style.display = chatWindow.style.display === 'none' ? 'flex' : 'none';
}

async function enviarMensajeIA() {
    const input = document.getElementById('ai-user-msg');
    const texto = input.value.trim();
    if (!texto) return;

    const contenedor = document.getElementById('ai-chat-messages');
    contenedor.innerHTML += `<div class="msg user">${texto}</div>`;
    input.value = '';
    contenedor.scrollTop = contenedor.scrollHeight;

    // Aquí ya queda tu clave lista
    const API_KEY = "AQ.Ab8RN6KV1rLLeGNvfWrxxuNrpeRmuIgw0alVKk2qLwF9DTO5Vg"; 

    const contextoIngenieria = `Eres AutoCabrilla MX, un asistente experto en ingeniería estructural. 
    Datos del proyecto: Luz 6m, Separación 1m, Peralte 1m. Carga 100 kg/m². Perfil: PTR 1½"×1½" Cal 14. 
    Utilización: 16.7%. Deflexión: 1.07 mm. Estado: 100% Seguro. Responde breve y claro en español.`;

    try {
        // Formato de ruta oficial y correcto para Gemini 1.5 Flash
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: `${contextoIngenieria}\nUsuario: ${texto}` }]
                }]
            })
        });
        
        const data = await response.json();
        
        // Extracción correcta del texto de la respuesta de Google
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            const respuestaIA = data.candidates[0].content.parts[0].text;
            contenedor.innerHTML += `<div class="msg ai">${respuestaIA}</div>`;
        } else {
            contenedor.innerHTML += `<div class="msg ai">Recibí una respuesta vacía, por favor intenta de nuevo.</div>`;
        }
        contenedor.scrollTop = contenedor.scrollHeight;

    } catch (error) {
        console.error("Error:", error);
        contenedor.innerHTML += `<div class="msg ai">Hubo un problema al conectar con el servidor de ingeniería.</div>`;
        contenedor.scrollTop = contenedor.scrollHeight;
    }
}
</script>
</body>
</html>
